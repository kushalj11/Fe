<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#a21caf" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.2" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#7c3aed" flood-opacity="0.5" />
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer hexagon -->
  <polygon
    points="200,20 370,110 370,290 200,380 30,290 30,110"
    fill="url(#hexGrad)"
    filter="url(#shadow)"
  />

  <!-- Inner hexagon border -->
  <polygon
    points="200,38 352,120 352,280 200,362 48,280 48,120"
    fill="none"
    stroke="url(#glowGrad)"
    stroke-width="2.5"
  />

  <!-- Decorative corner dots -->
  <circle cx="200" cy="38"  r="5" fill="#c084fc" opacity="0.8"/>
  <circle cx="352" cy="120" r="5" fill="#c084fc" opacity="0.8"/>
  <circle cx="352" cy="280" r="5" fill="#c084fc" opacity="0.8"/>
  <circle cx="200" cy="362" r="5" fill="#c084fc" opacity="0.8"/>
  <circle cx="48"  cy="280" r="5" fill="#c084fc" opacity="0.8"/>
  <circle cx="48"  cy="120" r="5" fill="#c084fc" opacity="0.8"/>

  <!-- Lambda symbol -->
  <text
    x="200"
    y="272"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="210"
    font-weight="bold"
    text-anchor="middle"
    fill="white"
    opacity="0.97"
    filter="url(#innerGlow)"
  >λ</text>

  <!-- Subtle circuit lines -->
  <line x1="80"  y1="200" x2="130" y2="200" stroke="#a5b4fc" stroke-width="1.5" opacity="0.4"/>
  <line x1="270" y1="200" x2="320" y2="200" stroke="#a5b4fc" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="60"  x2="200" y2="100" stroke="#a5b4fc" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="310" x2="200" y2="345" stroke="#a5b4fc" stroke-width="1.5" opacity="0.4"/>

  <circle cx="130" cy="200" r="3" fill="#a5b4fc" opacity="0.5"/>
  <circle cx="270" cy="200" r="3" fill="#a5b4fc" opacity="0.5"/>
  <circle cx="200" cy="100" r="3" fill="#a5b4fc" opacity="0.5"/>
  <circle cx="200" cy="310" r="3" fill="#a5b4fc" opacity="0.5"/>
</svg>
